global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: tianbao_app
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - host.docker.internal:3000

    # If METRICS_TOKEN is enabled in the app, uncomment and set credentials:
    # authorization:
    #   type: Bearer
    #   credentials: "replace-with-your-metrics-token"
